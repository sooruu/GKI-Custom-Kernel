name: Build Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release Type"
        type: choice
        options: [ Actions, Pre-Release, Release ]
        default: Actions
      feature_set:
        description: "Feature Set"
        type: choice
        options:
          - BBG
          - None
        default: BBG
      ksu_commit:
        description: "KSU Commit (optional)"
        type: string
        default: ""
        required: false
  push:
    branches:
      - main

jobs:
  fetch-commits:
    runs-on: ubuntu-latest
    outputs:
      ksu_commit: ${{ steps.fetch.outputs.ksu_commit }}
      anykernel_commit: ${{ steps.fetch.outputs.anykernel_commit }}
      patches_commit: ${{ steps.fetch.outputs.patches_commit }}
      susfs_commit: ${{ steps.fetch.outputs.susfs_commit }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Fetch Commits
        id: fetch
        uses: ./.github/actions/fetch-commits
        with:
          ksu_commit: ${{ inputs.ksu_commit }}

  build-chenfeng-a14-6-1:
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/chenfeng-a14-6.1.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'BBG' }}
    secrets: inherit

  rej:
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    needs:
      - build-chenfeng-a14-6-1
    steps:
      - name: Download Misc Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts
          pattern: '*-Rejects'
          merge-multiple: false

      - name: Process Reject Artifacts
        run: |
          mkdir -p aio-rejects
          for dir in ./downloaded-artifacts/*-Rejects; do
              [ -d "$dir" ] || continue
              dirname=$(basename "$dir")
              original_name=${dirname%-Rejects}
              mkdir -p "aio-rejects/$original_name"
              if [ -d "$dir/patch-rejects" ]; then
                  cp -r "$dir/patch-rejects/." "aio-rejects/$original_name/"
              else
                  cp -r "$dir/." "aio-rejects/$original_name/"
              fi
          done
          if [ "$(ls -A aio-rejects)" ]; then
              cd aio-rejects
              zip -r -q -9 ../AIO-REJ.zip .
              cd ..
          else
              echo "No rejects found to upload."
          fi

      - name: Upload AIO-REJ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIO-REJ
          path: AIO-REJ.zip
          if-no-files-found: ignore

  release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_type != 'Actions' }}
    permissions:
      contents: write
    needs:
      - build-chenfeng-a14-6-1
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - name: Validate Build
        run: |
          if [[ "${{ needs.build-chenfeng-a14-6-1.result }}" != "success" ]]; then
            echo "Build failed"
            exit 1
          fi

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate New Tag
        id: tag
        run: |
          LATEST_TAG=$(gh api repos/${{ github.repository }}/tags --jq '.[0].name' 2>/dev/null || echo "v0.0.0")
          if [[ -z "$LATEST_TAG" || "$LATEST_TAG" == "null" ]]; then
            LATEST_TAG="v0.0.0"
          fi
          if [[ "$LATEST_TAG" =~ ^(.*)-r([0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            REV="${BASH_REMATCH[2]}"
            NEW_REV=$((REV + 1))
            NEW_TAG="${VERSION}-r${NEW_REV}"
          else
            NEW_TAG="${LATEST_TAG}-r1"
          fi
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Set release body
        run: |
          cat << 'EOF' > release_body.md
          ## PixelCore Kernel — Xiaomi 14 Civi (chenfeng)
          **Kernel:** 6.1.118-android14-2025-01
          **Device:** Xiaomi 14 Civi (SM8635 / Snapdragon 8s Gen 3)

          ### Features
          - Wild KSU root support
          - SUSFS root hiding
          - BBG (Baseband Guard)
          - BORE CPU scheduler

          ### Installation
          Flash via KernelFlasher: https://github.com/fatalcoder524/KernelFlasher/
          Manager: https://github.com/WildKernels/Wild_KSU

          **⚠️ Flash at your own risk. Back up your data first.**
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body_path: release_body.md
          draft: false
          prerelease: ${{ inputs.release_type == 'Pre-Release' }}
          files: |
            AnyKernel3/**/*.zip
            AIO-REJ.zip
