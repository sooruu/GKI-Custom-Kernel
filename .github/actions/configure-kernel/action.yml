name: 'Configure Kernel Options'
description: 'Set up kernel configuration fragment with required options'
inputs:
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Apply Kernel Configuration
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        # Optional kernel config placeholders
        # Networking Configuration
        CONFIG_IP_NF_TARGET_TTL=y
        CONFIG_IP6_NF_TARGET_HL=y
        CONFIG_IP6_NF_MATCH_HL=y

        # BBR TCP Congestion Control
        CONFIG_TCP_CONG_ADVANCED=y
        CONFIG_TCP_CONG_BBR=y
        CONFIG_NET_SCH_FQ=y
        # CONFIG_TCP_CONG_BIC is not set
        # CONFIG_TCP_CONG_WESTWOOD is not set
        # CONFIG_TCP_CONG_HTCP is not set

        # IPSet Support
        CONFIG_IP_SET=y
        CONFIG_IP_SET_MAX=65534
        CONFIG_IP_SET_BITMAP_IP=y
        CONFIG_IP_SET_BITMAP_IPMAC=y
        CONFIG_IP_SET_BITMAP_PORT=y
        CONFIG_IP_SET_HASH_IP=y
        CONFIG_IP_SET_HASH_IPMARK=y
        CONFIG_IP_SET_HASH_IPPORT=y
        CONFIG_IP_SET_HASH_IPPORTIP=y
        CONFIG_IP_SET_HASH_IPPORTNET=y
        CONFIG_IP_SET_HASH_IPMAC=y
        CONFIG_IP_SET_HASH_MAC=y
        CONFIG_IP_SET_HASH_NETPORTNET=y
        CONFIG_IP_SET_HASH_NET=y
        CONFIG_IP_SET_HASH_NETNET=y
        CONFIG_IP_SET_HASH_NETPORT=y
        CONFIG_IP_SET_HASH_NETIFACE=y
        CONFIG_IP_SET_LIST_SET=y

        # Timer frequency - smoother frame pacing for gaming
        # CONFIG_HZ_250 is not set
        CONFIG_HZ_300=y
        CONFIG_HZ=300

        # VM tuning - keep ZRAM compiled (GKI requirement) but use lz4 (fastest compression)
        CONFIG_ZRAM=m
        CONFIG_ZRAM_DEF_COMP_LZ4=y
        # CONFIG_ZRAM_DEF_COMP_ZSTD is not set
        # CONFIG_ZRAM_DEF_COMP_LZORLE is not set
        EOF

    - name: Apply Kernel Config for 5.10
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      if: inputs.kernel_version == '5.10' || inputs.kernel_version == '5.4'
      run: |
        sed -i 's/CONFIG_IP_SET_MAX/65534/g' net/netfilter/ipset/ip_set_core.c

    - name: Lock swappiness to 0 at kernel level
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        if [ -f mm/vmscan.c ]; then
          # Set default to 0
          sed -i 's/int vm_swappiness = 60;/int vm_swappiness = 0;/' mm/vmscan.c
          # Make swappiness read-only by ignoring writes
          # Find the sysctl handler and make it return without writing
          sed -i '/^int sysctl_vm_swappiness/,/^}/ {
            /proc_dointvec_minmax\|proc_dointvec/ {
              s/.*/\treturn 0; \/\* locked at 0 for gaming *\//
            }
          }' mm/vmscan.c 2>/dev/null || true
          echo "Locked vm_swappiness to 0"
        fi
