name: Setup Wild KSU
description: Download and configure Wild KSU with version tracking - pinned to stable commit
inputs:
  ksu_commit:
    description: "KSU Commit (pinned known-good commit)"
    required: false
    default: "e66883d0d4ebd608d804db05c208ec4b20d60db3"

runs:
  using: composite
  steps:
    - name: Download and Pin Wild KSU
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        # Last known-good commit before the susfs_set_i_state_on_external_dir breakage
        PINNED_COMMIT="${{ inputs.ksu_commit }}"
        if [ -z "$PINNED_COMMIT" ]; then
          PINNED_COMMIT="f7c10d1f009474e9490844b352bfca018e93d97b"
        fi

        echo "Cloning Wild_KSU and pinning to: $PINNED_COMMIT"

        # Clone full repo so we can checkout any commit
        git clone https://github.com/WildKernels/Wild_KSU.git Wild_KSU
        cd Wild_KSU
        git checkout "$PINNED_COMMIT"
        cd ..

        # Run the setup script from that pinned version
        bash Wild_KSU/kernel/setup.sh "$PINNED_COMMIT"

    - name: Enable KernelSU Config
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        # KernelSU Configuration
        CONFIG_KSU=y
        EOF
    
    - name: Extract KSU Version Info
      id: ksu-version
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/Wild_KSU
      run: |
        # Extract and export KSU version info
        KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null)
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null)
        KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null)
        KSU_VERSION=$((30000 + KSU_GIT_VERSION))
        
        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV
